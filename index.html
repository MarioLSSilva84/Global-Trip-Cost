<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Trip Cost Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Calcular Custo da Viagem Global</h1>
    </header>
    <main>
        <section id="cost-calculator">
            <h2>Calculadora de Custos</h2>
            <label for="destination">Destino:</label>
            <input type="text" id="destination" placeholder="Insira seu destino">
            <button id="calculate-cost">Calcular Custo</button>
        </section>
        <section id="result">
            <h2>Resultados</h2>
            <div id="cost-output"></div>
        </section>
    </main>
    <footer>
        <div id="cookie-banner">
            <p>Utilizamos cookies para garantir que você tenha a melhor experiência em nosso site. <a href="#">Saiba mais</a></p>
            <button id="accept-cookies">Aceitar</button>
        </div>
        <div id="adsense-placeholder">Anúncio Aqui</div>
        <p>Dicas de SEO: Utilize conectores e ofereça conteúdo de qualidade.</p>
    </footer>
</body>
</html>
