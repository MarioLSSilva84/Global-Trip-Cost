<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Global Trip Cost Pro - Calculadora Premium de Custos de Viagem com Geotargeting.">
    <meta name="theme-color" content="#10b981">
    <title>Global Trip Cost Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-light: #f8fafc; --bg-white: #ffffff; --text-dark: #0f172a; --text-muted: #64748b;
            --primary-start: #10b981; --primary-end: #059669; --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05); --shadow-md: 0 4px 6px rgba(15, 23, 42, 0.1);
            --shadow-lg: 0 10px 25px rgba(15, 23, 42, 0.15); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark);
            line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 100px;
        }
        .header {
            background: var(--bg-white); border-bottom: 1px solid var(--border-light); padding: 1.5rem 1rem;
            box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100;
        }
        .header-container {
            max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between;
            align-items: center; gap: 2rem; flex-wrap: wrap;
        }
        .logo {
            font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .select-group { display: flex; align-items: center; gap: 0.5rem; }
        .select-group label { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; }
        select {
            padding: 0.5rem 0.75rem; border: 1px solid var(--border-light); border-radius: 0.5rem;
            background: var(--bg-white); color: var(--text-dark); font-family: 'Inter', sans-serif;
            cursor: pointer; transition: var(--transition); font-size: 0.875rem;
        }
        select:hover { border-color: var(--primary-start); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .main { flex: 1; max-width: 1400px; width: 100%; margin: 0 auto; padding: 2rem 1rem; }
        .ad-zone { width: 100%; background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%); border: 2px dashed #cbd5e1;
            border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.875rem; font-weight: 500;
        }
        .ad-top { max-width: 728px; height: 90px; margin: 0 auto 2rem; }
        .calculator-wrapper { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; margin-bottom: 3rem; }
        .results-wrapper { display: flex; flex-direction: column; gap: 1rem; }
        .inputs-column { display: flex; flex-direction: column; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.875rem; font-weight: 600; color: var(--text-dark); }
        .input-wrapper { display: flex; align-items: center; gap: 0.5rem; }
        input[type="number"], input[type="text"] {
            flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border-light); border-radius: 0.5rem;
            font-family: 'Inter', sans-serif; font-size: 1rem; background: var(--bg-white); color: var(--text-dark);
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none; border-color: var(--primary-start); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .input-suffix { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; min-width: 60px; text-align: center; }
        input[type="range"] {
            width: 100%; height: 6px; border-radius: 3px; background: var(--border-light);
            outline: none; -webkit-appearance: none; appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            cursor: pointer; box-shadow: var(--shadow-md);
        }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; }
        .toggle-switch {
            position: relative; width: 50px; height: 28px; background: var(--border-light);
            border-radius: 14px; cursor: pointer;
        }
        .toggle-switch.active { background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%); }
