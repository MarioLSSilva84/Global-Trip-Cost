<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Global Trip Cost Pro - Calculadora Premium de Custos de Viagem. Multi-idioma, PWA instalável, cálculo em tempo real para viagens profissionais.">
    <meta name="theme-color" content="#10b981">
    <title>Global Trip Cost Pro - Calculadora de Custos de Viagem</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2310b981' width='180' height='180'/><text x='50%' y='50%' font-size='100' font-weight='bold' text-anchor='middle' dominant-baseline='middle' fill='white'>🚗</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --primary-start: #10b981;
            --primary-end: #059669;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 4px 6px rgba(15, 23, 42, 0.1);
            --shadow-lg: 0 10px 25px rgba(15, 23, 42, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-light);
            padding: 1.5rem 1rem;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .select-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .select-group label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            background: var(--bg-white);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.875rem;
        }

        select:hover { border-color: var(--primary-start); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        select:focus { outline: none; border-color: var(--primary-start); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }

        .main {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .ad-top-leaderboard {
            width: 100%;
            max-width: 728px;
            height: 90px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            border: 2px dashed #cbd5e1;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .calculator-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .inputs-column { display: flex; flex-direction: column; gap: 1.5rem; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon-svg { width: 18px; height: 18px; flex-shrink: 0; }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="number"], input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-white);
            color: var(--text-dark);
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-start);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .input-suffix {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
            min-width: 40px;
            text-align: center;
        }

        .slider-container { display: flex; flex-direction: column; gap: 0.5rem; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-muted); }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border-light);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        input[type="range"]::-moz-range-thumb:hover { transform: scale(1.2); }

        .toggle-container { display: flex; align-items: center; gap: 1rem; }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: var(--border-light);
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        .toggle-switch.active { background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%); }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: var(--bg-white);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .toggle-switch.active::after { left: 24px; }

        .btn-calculate {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
            margin-top: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-calculate:active { transform: translateY(0); }

        .results-column { position: relative; }

        .results-card {
            background: var(--bg-white);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 100px;
            border: 1px solid var(--border-light);
        }

        .results-card h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .result-main {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            line-height: 1;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-light);
        }

        .result-item:last-child { border-bottom: none; }

        .result-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .result-value {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1rem;
        }

        .ad-sidebar-skyscraper {
            width: 100%;
            max-width: 300px;
            height: 600px;
            background: linear-gradient(135deg, #fce7f3 0%, #fecaca 100%);
            border: 2px dashed #cbd5e1;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }

        .ad-in-content-native {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border: 2px dashed #cbd5e1;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            padding: 1rem;
            margin: 2rem 0;
        }

        .seo-section {
            background: var(--bg-white);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin: 3rem 0;
            border: 1px solid var(--border-light);
        }

        .seo-section h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .seo-tips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .tip-card {
            background: var(--bg-light);
            border-radius: 0.75rem;
            padding: 1.5rem;
            border-left: 4px solid var(--primary-start);
        }

        .tip-card strong { color: var(--text-dark); font-weight: 600; }
        .tip-card p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem; }

        .footer {
            background: var(--bg-white);
            border-top: 1px solid var(--border-light);
            padding: 2rem 1rem;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .footer-section h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .footer-section a {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: var(--transition);
            margin: 0.25rem 0;
        }

        .footer-section a:hover { color: var(--primary-start); }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border-light);
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 2rem;
        }

        .cookies-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-white);
            border-top: 1px solid var(--border-light);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        .cookies-banner.hidden { display: none; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .cookies-text {
            flex: 1;
            min-width: 200px;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .cookies-text a {
            color: var(--primary-start);
            text-decoration: none;
            font-weight: 600;
        }

        .cookies-text a:hover { text-decoration: underline; }

        .cookies-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-cookie {
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            transition: var(--transition);
        }

        .btn-cookie-accept {
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            color: white;
        }

        .btn-cookie-accept:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-cookie-reject {
            background: var(--border-light);
            color: var(--text-dark);
        }

        .btn-cookie-reject:hover { background: #cbd5e1; }

        @media (max-width: 1024px) {
            .calculator-wrapper { grid-template-columns: 1fr; gap: 1.5rem; }
            .results-card { position: static; }
            .ad-sidebar-skyscraper { display: none; }
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; gap: 1rem; }
            .controls { width: 100%; justify-content: space-between; }
            .result-main { font-size: 2.5rem; }
            .main { padding: 1rem; }
            .cookies-banner { flex-direction: column; align-items: flex-start; }
            .cookies-buttons { width: 100%; }
            .btn-cookie { flex: 1; text-align: center; }
            .seo-tips { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.25rem; }
            .result-main { font-size: 2rem; }
            .controls { gap: 0.5rem; }
            select { font-size: 0.75rem; padding: 0.4rem 0.5rem; }
            .main { padding: 0.5rem; }
            .results-card { padding: 1.5rem; }
            input[type="number"], input[type="text"] { font-size: 16px; }
            .btn-calculate { padding: 0.75rem 1.5rem; font-size: 0.95rem; }
        }
    </style>
</head>

        <div class="header-container">
            <div class="logo">🚗 Global Trip Cost Pro</div>
            <div class="controls">
                <div class="select-group">
                    <label for="language-select">🌐 Idioma:</label>
                    <select id="language-select">
